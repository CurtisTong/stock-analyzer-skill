[project]
name = "stock-analyzer-skill"
version = "1.13.1"
description = "A-share stock analyzer Claude Code plugin"
requires-python = ">=3.11"

[project.optional-dependencies.test]
pytest = ">=8.0"
pytest-xdist = ">=3.0"
pytest-timeout = ">=2.0"
pytest-cov = ">=4.0"
hypothesis = ">=6.0"
pyyaml = ">=6.0"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["scripts"]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
]
