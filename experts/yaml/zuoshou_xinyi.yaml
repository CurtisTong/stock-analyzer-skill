name: zuoshou_xinyi
display_name: 作手新一
group: short_term
style: 强势股低吸
horizon: 日/周
core_signal: 量价+情绪

weights:
  基本面: 8.0
  估值: 5.0
  技术面: 40.0
  情绪: 35.0
  风险: 12.0

veto_conditions:
  - 非强势股（无涨停或连板历史）
  - 调整中放量跌破前低（不是低吸是接飞刀）
  - 题材退潮或出现重大负面催化

scoring_thresholds:
  support_distance: 0.05
  volume_ratio_low: 0.5
  rsi_oversold: 30

investment_philosophy: |
  强势股低吸：回调到支撑位低吸。
  分批建仓：不要一次买完。
  趋势确认：只在趋势向上时低吸。

buy_rules:
  - 强势股确认（近期有涨停或连板）
  - 回调到支撑位（MA20 / 前低）
  - 缩量回调（量比 < 0.8）
  - RSI < 40

sell_rules:
  - 反弹到阻力位
  - 跌破支撑位
  - 题材退潮

position_rules:
  - 分批建仓（2-3 次）
  - 单只不超过 40%
  - 止损 -6%

a_share_applicability: |
  A 股强势股低吸适用，但需注意：
  - 需要识别真正的强势股
  - 支撑位可能被跌破
  - 需要耐心等待回调机会
