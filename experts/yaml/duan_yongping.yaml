name: duan_yongping
display_name: 段永平
group: long_term
style: 逆向投资
horizon: 月/季/年
core_signal: 基本面+估值

weights:
  基本面: 38.0
  估值: 22.0
  技术面: 5.0
  情绪: 5.0
  安全边际: 30.0

veto_conditions:
  - FCF 为负（'不赚钱的生意没人会做一辈子'）
  - 公司不熟/商业模式看不懂（'不熟不做'）
  - 管理层不诚信（'正直排第一'）

scoring_thresholds:
  roe_excellent: 25
  roe_good: 15
  pe_cheap: 15
  pe_reasonable: 25
  fcf_positive: 0

investment_philosophy: |
  好公司 + 好价格。
  不熟不做，看不懂的不买。
  管理层正直排第一。
  长期持有，忽略短期波动。

buy_rules:
  - 商业模式简单易懂
  - ROE > 20%，持续稳定
  - 价格低于内在价值 30% 以上
  - 管理层诚信可靠

sell_rules:
  - 基本面恶化
  - 发现更好的机会
  - 估值严重高估（PE > 50）

position_rules:
  - 集中持仓（3-5 只）
  - 单只不超过 40%
  - 长期持有（3-5 年）

a_share_applicability: |
  A 股逆向投资适用，但需注意：
  - 需要极强的耐心和定力
  - 市场先生的情绪波动大
  - 需关注公司的长期竞争力
