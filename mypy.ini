[mypy]
# 全局配置：增量严格模式
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True

# 忽略第三方库的类型存根（可选依赖无 type stubs）
ignore_missing_imports = True

# 增量模式：只检查 common/ 子包（pythonpath=scripts，所以模块路径是 common.*）
[mypy-common.*]
strict = True
disallow_untyped_defs = True
disallow_any_generics = True
no_implicit_optional = True

# 其他模块暂不开启 strict，避免大面积报错
[mypy-experts.*]
strict = False

[mypy-fetchers.*]
strict = False

[mypy-business.*]
strict = False
