[mypy]
# 全局配置：增量严格模式（仅对 common/ 子包启用 strict，其他模块宽松）
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True

# 忽略第三方库的类型存根（可选依赖无 type stubs）
ignore_missing_imports = True

# 默认关闭 strict：scripts/ 顶层模块不符合 strict 要求（pre-existing 债），
# 仅 common.* 子包启用 strict（见下方 [mypy-common.*]）
strict = False
disallow_any_generics = False
disallow_untyped_defs = False
no_implicit_optional = False

# 关闭脚本模块的常见 mypy 错误类别，避免阻塞 PR（pre-existing 债清理见
# docs/review-issues.md v2.7.x 基建债第 1 项）。
# 以下错误多数源自历史代码缺类型注解/Optional 转换，单独修复工作量巨大。
disable_error_code = type-arg, no-untyped-def, no-untyped-call, no-any-return, var-annotated, index

# 增量模式：只检查 common/ 子包（pythonpath=scripts，所以模块路径是 common.*）
[mypy-common.*]
strict = True
disallow_untyped_defs = True
disallow_any_generics = True
no_implicit_optional = True

# 其他模块暂不开启 strict，避免大面积报错
[mypy-experts.*]
strict = False

[mypy-fetchers.*]
strict = False

[mypy-business.*]
strict = False
