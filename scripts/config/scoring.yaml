# 默认行业阈值（DEPRECATED: v1.14.2）
# ⚠️ 代码实际从 data/industry_thresholds.json 加载（strategies.thresholds.get_industry_threshold），
# 此处配置未被读取，仅作为历史快照保留。修改此处不会生效，请改 data/industry_thresholds.json
industry_defaults:
  pe_undervalued: 15
  pe_reasonable: 25
  pe_expensive: 40
  peg_undervalued: 0.8
  peg_reasonable: 1.5
  roe_excellent: 20
  gross_margin_min: 20
  debt_ratio_max: 60
  profit_growth_excellent: 40
  revenue_growth_excellent: 30

# 专家评分参数
experts:
  soros:
    market_liquidity_floor_yi: 7000  # 两市日均成交额（亿元），低于此值视为流动性枯竭（soros.py 读取）
  short_term:
    # 第六轮审查（v2.4.3）：防御市/熊市短线组分数乘子
    # 短线专家在防御市历史准确率仅 20%，定向压分绕过权重钳制
    defensive_score_factor: 0.7  # 防御型/熊市时短线组分数 ×0.7（1.0=不降权）
    bearish_states: ["防御型", "熊市"]  # 触发降权的市场状态
    ice_states: ["冰点"]  # 豁免降权的市场状态（冰点=机会起爆点）

# 情绪温度计阈值（v1.15.0 起可配置）
# 两融余额绝对阈值（亿元），随市场扩容需定期更新
sentiment:
  margin_balance_thresholds:
    - [19000, 85]  # >19000亿 → 85分
    - [18000, 75]
    - [17000, 65]
    - [16000, 55]
    - [15000, 45]
    - [0, 35]      # ≤15000亿 → 35分

# 校准阈值（v1.7.1 起可配置，experts/calibration.py:_get_calibration_threshold 读取）
calibration:
  calibration_threshold_pct: 5  # 涨跌判定阈值（%），>5%=上涨，<-5%=下跌，其余横盘
