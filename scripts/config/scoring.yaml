  # chip 权重在 scoring.py 硬编码（与股类型相关），此处不再重复配置

# 默认行业阈值
industry_defaults:
  pe_undervalued: 15
  pe_reasonable: 25
  pe_expensive: 40
  peg_undervalued: 0.8
  peg_reasonable: 1.5
  roe_excellent: 20
  gross_margin_min: 20
  debt_ratio_max: 60
  profit_growth_excellent: 40
  revenue_growth_excellent: 30
