# A 股评分系统配置

# 均线排列评分
alignment_scores:
  多头排列: 20
  交叉震荡: 12
  空头排列: 3
  数据不足: 7

# MACD 评分
macd_scores:
  金叉放大: 15
  金叉: 10
  死叉: 3
  中性: 7

# 市场环境权重调整
market_weights:
  牛市:
    bullish_bias: 1.3
    trend_following: 1.4
    breakout: 1.3
    divergence_bottom: 0.5
    buy_point_1: 0.5
    buy_point_3: 1.3
    overbought: 0.8
    desc: "牛市：趋势跟随加权，底背离/一买降权"
  
  熊市:
    bullish_bias: 1.5
    trend_following: 0.6
    breakout: 0.6
    divergence_bottom: 1.5
    buy_point_1: 1.5
    buy_point_3: 0.5
    overbought: 1.3
    desc: "熊市：反转信号加权，追涨信号降权"
  
  震荡:
    bullish_bias: 1.0
    trend_following: 0.8
    breakout: 0.8
    divergence_bottom: 1.2
    buy_point_1: 1.1
    buy_point_3: 1.2
    overbought: 1.0
    desc: "震荡：反转+区间交易加权，趋势信号降权"
  
  冰点:
    bullish_bias: 1.8
    trend_following: 0.3
    breakout: 0.4
    divergence_bottom: 1.8
    buy_point_1: 2.0
    buy_point_3: 0.3
    overbought: 1.5
    desc: "冰点：极度超卖反转加权，趋势信号大幅降权"
  
  亢奋:
    bullish_bias: 0.6
    trend_following: 0.5
    breakout: 0.5
    divergence_bottom: 0.4
    buy_point_1: 0.3
    buy_point_3: 0.5
    overbought: 0.3
    desc: "亢奋：全面保守，警惕反转"

