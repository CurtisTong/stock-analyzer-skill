# 数据源配置
# 注意: 运行时 fetcher 优先级以此文件为准（DataFetcherManager 初始化时读取并覆盖代码中的默认值）。
# 数字越大优先级越高，修改后无需重启即可在下次 manager 初始化时生效。

# 行情数据源优先级 (数字越大优先级越高)
quote_sources:
  tencent:
    priority: 10
    enabled: true
    timeout: 10
    retry: 3

  eastmoney:
    priority: 8
    enabled: true
    timeout: 10
    retry: 3

  xueqiu:
    priority: 8
    enabled: true
    timeout: 10
    retry: 2

  pytdx:
    priority: 9
    enabled: true
    timeout: 5
    retry: 1
    # 局域网通达信端口直连，速度快、无限频
    # 需要：pip install pytdx + 本地通达信客户端开启 7709 端口

  sina:
    priority: 5
    enabled: true
    timeout: 10
    retry: 2

  ths:
    priority: 3
    enabled: true
    timeout: 10
    retry: 2

  efinance:
    priority: 3
    enabled: true
    timeout: 15
    retry: 2

  akshare:
    priority: 2
    enabled: true
    timeout: 20
    retry: 1

  tushare:
    priority: 1
    enabled: true
    timeout: 20
    retry: 1

# K线数据源配置
kline_sources:
  sina:
    priority: 10
    enabled: true
    timeout: 15
    max_datalen: 1024

  pytdx:
    priority: 9
    enabled: true
    timeout: 5
    max_datalen: 800
    # 局域网通达信端口直连，K 线全市场 + 历史回溯深度大
    # 需要：pip install pytdx + 本地通达信客户端开启 7709 端口

  eastmoney:
    priority: 8
    enabled: true
    timeout: 15
    max_datalen: 500

  tencent:
    priority: 6
    enabled: true
    timeout: 15
    max_datalen: 500

  efinance:
    priority: 4
    enabled: true
    timeout: 20
    max_datalen: 500

  akshare:
    priority: 3
    enabled: true
    timeout: 30
    max_datalen: 500

  tushare:
    priority: 2
    enabled: true
    timeout: 30
    max_datalen: 500

  baostock:
    priority: 1
    enabled: true
    timeout: 30
    max_datalen: 500

  yfinance:
    priority: 0
    enabled: false
    timeout: 30
    max_datalen: 500

# 财务数据源配置
finance_sources:
  eastmoney:
    priority: 10
    enabled: true
    timeout: 15
    retry: 3

  akshare:
    priority: 3
    enabled: true
    timeout: 30
    retry: 1

# 熔断器配置
circuit_breaker:
  failure_threshold: 5
  recovery_timeout: 60
  half_open_max: 3

# HTTP 配置
http:
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
  max_redirects: 3
  connect_timeout: 10
  read_timeout: 30

# 缓存配置
cache:
  quote_ttl: 900          # 15分钟（盘后）
  intraday_quote_ttl: 90  # 90秒（盘中）
  kline_ttl: 21600        # 6小时
  kline_1m_ttl: 30        # 30秒（分钟K线）
  kline_240m_ttl: 3600    # 1小时（日K线）
  finance_ttl: 21600      # 6小时
  margin_ttl: 3600        # 1小时（融资融券）
  ann_ttl: 1800           # 30分钟
  max_size: 1000          # 最大缓存文件数
  max_age: 604800         # 7天
