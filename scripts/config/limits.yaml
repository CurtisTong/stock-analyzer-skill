# A 股市场限制配置

# 涨跌停限制 (%)
board_limits:
  主板: 9.5
  创业板: 19.5
  科创板: 19.5
  北交所: 29.5

# 最低市值要求 (亿元)
min_total_cap:
  主板: 40
  创业板: 20
  科创板: 20
  北交所: 10

# 最低成交额要求 (万元)
min_amount:
  主板: 5000
  创业板: 3000
  科创板: 3000
  北交所: 1000

# 退市风险市值 (亿元) — 2026注册制常态化，退市门槛提高
min_survival_cap:
  主板: 5
  创业板: 3
  科创板: 3
  北交所: 2

# P1-22: st_prefixes 已删除，ST 检测统一使用 data.pool.is_st（子串匹配）

# 商誉减值风险阈值 (%)
goodwill_ratio_warning: 30
goodwill_ratio_danger: 50

# 股权质押风险阈值 (%)
pledge_ratio_warning: 70
pledge_ratio_danger: 85

# 连续亏损检测
loss_years_warning: 2
loss_years_danger: 3

# 止损止盈阈值 (%)
stop_loss_pct: -8
take_profit_pct: 20

# 预筛选自适应流动性阈值 (#1)
# 成交额/市值门槛跟随全市场水位动态调整，避免缩量时过度瘦身、亢奋时保留过多跟风股
# 动态阈值 = clamp(market_ref * ratio, absolute_floor, absolute_ceiling)
# absolute_floor 来自上方 min_amount / min_total_cap（防止缩量时门槛过低）
pre_screen_adaptive:
  enabled: true
  # 成交额：动态门槛 = 全市场日均成交额 × 万分之一
  amount_ratio: 0.0001        # 万分之一
  amount_ceiling_multiplier: 3.0   # 上限 = 板块基准阈值 × 3（防亢奋时门槛过高）
  # 市值：动态门槛 = 全市场中位市值 × 0.5
  cap_ratio: 0.5
  cap_ceiling_multiplier: 2.0     # 上限 = 板块基准阈值 × 2
