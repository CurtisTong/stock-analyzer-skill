name: 'Setup Test Environment'
description: '设置 Python 测试环境并安装依赖'

inputs:
  python-version:
    description: 'Python 版本'
    required: false
    default: '3.12'

outputs:
  python-version:
    description: '实际安装的 Python 版本'
    value: ${{ steps.setup.outputs.python-version }}

runs:
  using: "composite"
  steps:
    - name: 设置 Python ${{ inputs.python-version }}
      id: setup
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: |
          pyproject.toml

    - name: 安装依赖
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install pytest pyyaml pytest-xdist pytest-timeout pytest-cov hypothesis

    - name: 同步 SKILL.md 版本到测试文件
      shell: bash
      run: |
        # 防止开发者 bump 版本后忘记同步 test_skill_metadata.py，
        # 导致 release workflow 的 test job 失败阻塞 publish。
        python3 scripts/dev/sync_skill_test_versions.py

    - name: 创建 .gitignore 占位文件（check_allowed_tools 路径校验用）
      shell: bash
      run: |
        # scripts/data/portfolio*.json 在 .gitignore 中，CI 环境 checkout 后不存在，
        # 但 SKILL.md 声明了 Read(./scripts/data/portfolio.json) allowed-tools，
        # check_allowed_tools.py --ci 会校验路径存在性。
        mkdir -p scripts/data
        [ -f scripts/data/portfolio.json ] || echo '{"version":2,"positions":[],"watchlist":[]}' > scripts/data/portfolio.json
        [ -f scripts/data/portfolio_virtual.json ] || echo '{"version":2,"positions":[],"watchlist":[]}' > scripts/data/portfolio_virtual.json
