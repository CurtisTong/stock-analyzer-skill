name: 'Setup Test Environment'
description: '设置 Python 测试环境并安装依赖'

inputs:
  python-version:
    description: 'Python 版本'
    required: false
    default: '3.12'

outputs:
  python-version:
    description: '实际安装的 Python 版本'
    value: ${{ steps.setup.outputs.python-version }}

runs:
  using: "composite"
  steps:
    - name: 设置 Python ${{ inputs.python-version }}
      id: setup
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: |
          pyproject.toml

    - name: 安装依赖
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install pytest pyyaml pytest-xdist pytest-timeout pytest-cov
