name: Update Changelog

on:
  push:
    branches: [main]
    paths-ignore:
      - 'CHANGELOG.md'
      - 'docs/**'
      - 'README.md'
      - 'CONTRIBUTING.md'

permissions:
  contents: write

concurrency:
  group: changelog-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-changelog:
    name: 更新 CHANGELOG
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 检查是否有新 Conventional Commits
        id: check
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "has_new=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 检查 tag 到 HEAD 之间是否有 Conventional Commits
          COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline --format="%s" | \
            grep -E "^(feat|fix|docs|refactor|perf|chore|ci|style|test|build)" || true)
          if [ -n "$COMMITS" ]; then
            echo "has_new=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_new=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 生成并追加 CHANGELOG
        if: steps.check.outputs.has_new == 'true'
        run: |
          python3 scripts/dev/gen_changelog.py --append

      - name: 提交更改
        if: steps.check.outputs.has_new == 'true'
        run: |
          # 检查是否有实际更改
          if git diff --quiet CHANGELOG.md; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: auto-update CHANGELOG.md [skip ci]"
          # P0-14: push 加重试，避免并发 push 导致的非快进冲突
          for i in 1 2 3; do
            if git push; then
              break
            elif [ "$i" -lt 3 ]; then
              echo "Push failed (attempt $i), rebase and retry..."
              git pull --rebase origin main
            else
              echo "Push failed after 3 attempts"
              exit 1
            fi
          done
