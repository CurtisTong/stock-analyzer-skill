name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: 单元测试 + skill 元数据校验
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml
          # 核心脚本零外部依赖；测试只需 pytest + pyyaml

      - name: 跑全量测试（默认不含网络测试）
        run: |
          python -m pytest tests/ -x -q \
            --ignore=tests/integration \
            -m "not network"

      - name: 跑 skill 元数据校验
        run: |
          python -m pytest tests/test_skill_metadata.py tests/test_skill_consistency.py -v

      - name: 跑 install.sh 集成测试（仅 main 分支）
        if: github.ref == 'refs/heads/main'
        run: |
          chmod +x tests/integration/test_install.sh
          bash tests/integration/test_install.sh

  lint-frontmatter:
    name: SKILL.md frontmatter 一致性
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 校验 12 个 skill 元数据
        run: |
          python -m pytest tests/test_skill_metadata.py tests/test_skill_consistency.py -q
