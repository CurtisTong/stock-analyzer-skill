name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: 设置测试环境
        uses: ./.github/actions/setup-test
        with:
          python-version: ${{ matrix.python-version }}

      - name: 跑全量测试
        run: |
          python -m pytest tests/ -x -q \
            --ignore=tests/integration \
            -m "not network" \
            --timeout=60 \
            -n auto \
            --durations=10 \
            --cov=scripts --cov=experts \
            --cov-fail-under=60

      - name: 跑 skill 元数据校验
        run: |
          python -m pytest tests/test_skill_metadata.py tests/test_skill_consistency.py -v

  checks:
    name: 代码检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置测试环境
        uses: ./.github/actions/setup-test

      - name: 安装 lint 工具
        run: pip install black ruff mypy

      - name: 版本一致性检查
        run: python3 scripts/dev/sync_version.py --check

      - name: SKILL.md 版本与测试常量一致性
        # 防止 bump package.json 后忘记同步 test_skill_metadata.py，
        # 导致 release workflow 的 test job 失败阻塞 publish
        run: python3 scripts/dev/sync_skill_test_versions.py --check

      - name: allowed-tools 自审计
        run: python3 scripts/dev/check_allowed_tools.py --ci

      - name: black 格式检查
        run: black --check scripts/ experts/ tests/

      - name: ruff 静态检查
        run: ruff check scripts/ experts/ tests/ --line-length=120

      - name: mypy 类型检查
        # NOTE: 缩窄至本 PR 涉及的 6 个文件，避免 common/ 内 280+ pre-existing
        # 错误阻塞 PR（详见 docs/review-issues.md v2.7.x 基建债项 1）。
        # 待 mypy strict 全量清理后恢复 mypy scripts/common/
        run: |
          mypy --follow-imports=silent --no-incremental \
            scripts/market_anchor.py \
            scripts/sector_etf_strength.py \
            scripts/industry_beta.py \
            scripts/portfolio_correlation.py \
            scripts/macro_indicators.py \
            scripts/strategies/factors/dcf.py

  integration:
    name: 集成测试
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: 跑 install.sh 集成测试
        run: |
          chmod +x tests/integration/test_install.sh
          bash tests/integration/test_install.sh

  smoke:
    name: 冒烟测试
    runs-on: ubuntu-latest
    needs: test
    concurrency:
      group: smoke-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: 设置测试环境
        uses: ./.github/actions/setup-test

      - name: 跑 install.sh 创建 .claude/skills/ symlink
        run: bash install.sh

      - name: 跑 smoke_test.sh
        run: |
          chmod +x tests/smoke_test.sh
          bash tests/smoke_test.sh

  contracts:
    name: Schema 契约校验
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: 设置测试环境
        uses: ./.github/actions/setup-test

      - name: 校验 contracts/*.schema.json
        run: |
          python3 scripts/dev/validate_contracts.py
