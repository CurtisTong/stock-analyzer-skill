name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  validate:
    name: 验证发布条件
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_publish: ${{ steps.check.outputs.should_publish }}

    steps:
      - uses: actions/checkout@v4

      - name: 提取版本号
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: 校验 package.json 版本一致性
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: 检查 npm 是否已发布
        id: check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # 检查 npm 上是否已有该版本
          if npm view stock-analyzer-skill@$VERSION version 2>/dev/null; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Version $VERSION already exists on npm, skipping publish"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: 测试验证
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: 设置测试环境
        uses: ./.github/actions/setup-test
        with:
          python-version: ${{ matrix.python-version }}

      - name: 跑全量测试
        run: python -m pytest tests/ -x -q --ignore=tests/integration -m "not network" --cov=scripts --cov=experts

      - name: 跑 skill 元数据校验
        run: python -m pytest tests/test_skill_metadata.py tests/test_skill_consistency.py -v

  publish:
    name: 发布到 npm
    needs: [validate, test]
    if: needs.validate.outputs.should_publish == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: 检查包内容
        run: npm pack --dry-run

      - name: 发布到 npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: 创建 GitHub Release
    needs: [validate, publish]
    if: always() && needs.validate.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 提取当前版本 CHANGELOG
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found=1
              next
            }
            found { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "See [CHANGELOG.md](CHANGELOG.md) for details." > release_notes.md
          fi

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          generate_release_notes: false
