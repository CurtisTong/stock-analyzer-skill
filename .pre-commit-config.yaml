# Pre-commit hooks（Sprint 7 工程化债清理）
# 安装: pip install pre-commit
# 启用: pre-commit install
# 手动跑: pre-commit run --all-files

repos:
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        args: [--fast, --target-version=py311]
        files: ^(scripts|experts|tests)/.*\.py$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--line-length=120, --fix]
        files: ^(scripts|experts|tests)/.*\.py$

  - repo: local
    hooks:
      - id: pytest-quick
        name: 快速核心测试（pre-commit，<5s）
        # P1-29: pre-commit 阶段跑核心业务测试，失败即阻止提交
        # 完整测试见 pytest-sprint-tests（manual 阶段）
        entry: python3 -m pytest tests/test_business.py tests/test_screener.py tests/test_finance_normalize.py tests/test_market_regime.py -x -q -m "not network"
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-commit]

      - id: pytest-sprint-tests
        name: 跑 Sprint 1-6 核心测试
        entry: python3 -m pytest tests/test_backtest.py tests/test_business.py tests/test_screener.py tests/test_turning_point.py tests/test_finance_normalize.py tests/test_market_regime.py tests/test_portfolio_constraints.py tests/test_factor_refinements.py tests/test_sprint4_optimizations.py tests/test_snapshots.py tests/test_sprint6_calibration.py -x -q
        language: system
        pass_filenames: false
        types: [python]
        stages: [manual]

      - id: sync-skill-test-versions
        name: 同步 SKILL.md 版本到 test_skill_metadata.py
        # bump package.json 后自动同步测试常量，避免 release CI 阻塞
        entry: python3 scripts/dev/sync_skill_test_versions.py
        language: system
        pass_filenames: false
        files: ^(package\.json|skills/.*/SKILL\.md)$
        stages: [pre-commit]

      - id: check-skill-test-versions
        name: 检查 SKILL.md 版本与测试常量一致
        # 提交前门禁：检测 sync 后的文件是否已 git add
        entry: python3 scripts/dev/sync_skill_test_versions.py --check
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-commit]
